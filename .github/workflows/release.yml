name: Release

on:
  push:
    tags:
      - 'v*'

concurrency: release

permissions:
  id-token: write  # Required for OIDC
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Set npm tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          else
            echo "NPM_TAG=beta" >> $GITHUB_ENV
          fi

      - name: Publish
        run: |
          npm ci
          npm test
          npm run build
          npx -y npm@latest publish --tag $NPM_TAG

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
            name: Mock XP API ${{ github.ref_name }}

